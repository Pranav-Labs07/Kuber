services:
  # ─── BACKEND (Node/Express) ───────────────────────────────────────
  - type: web
    name: kuber-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_CONNECT
        sync: false          # Set manually in Render Dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render Dashboard
      - key: GOOGLE_MAPS_API
        sync: false          # Set manually in Render Dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your frontend Render URL after deploy

  # ─── FRONTEND (React / Vite) ──────────────────────────────────────
  - type: web
    name: kuber-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BASE_URL
        sync: false          # Set to your backend Render URL after deploy
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false          # Set manually in Render Dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
